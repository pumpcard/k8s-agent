name: Prod Build and Deploy (k8s-agent)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

concurrency:
  group: ${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-push:
    name: k8s-agent builder
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: 016493718240.dkr.ecr.us-west-2.amazonaws.com
      ECR_REPOSITORY: pump
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::016493718240:role/github-deployer
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
          region: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: image=moby/buildkit:v0.25.1

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}-k8s-agent
            public.ecr.aws/b6q7g2c1/pump:${{ env.IMAGE_TAG }}-k8s-agent
            public.ecr.aws/b6q7g2c1/pump:latest-k8s-agent

  publish-chart:
    name: Publish Helm chart
    needs: [build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Package chart
        run: |
          helm package charts/k8s-agent
          CHART_VERSION=$(grep '^version:' charts/k8s-agent/Chart.yaml | awk '{print $2}')
          echo "CHART_VERSION=$CHART_VERSION" >> $GITHUB_ENV
          echo "CHART_FILE=k8s-agent-${CHART_VERSION}.tgz" >> $GITHUB_ENV

      - name: Checkout gh-pages branch
        id: checkout-gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create gh-pages branch if it doesn't exist
        if: steps.checkout-gh-pages.outcome == 'failure'
        run: |
          mkdir -p gh-pages
          cd gh-pages
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git || \
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Update chart repository index
        run: |
          cd gh-pages
          cp ../${{ env.CHART_FILE }} .
          helm repo index . --url https://pumpcard.github.io/k8s-agent --merge index.yaml || \
          helm repo index . --url https://pumpcard.github.io/k8s-agent

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add .
          git commit -m "Add chart version ${{ env.CHART_VERSION }}" || echo "No changes to commit"
          git push origin gh-pages || git push -u origin gh-pages

      - name: Cleanup
        if: always()
        run: rm -f k8s-agent-*.tgz
