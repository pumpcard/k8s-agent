# Default values for k8s-agent-test
# This is a YAML-formatted file.

# Image configuration
image:
  repository: pump/k8s-agent-test
  tag: "v1.0.0"
  pullPolicy: Always

# Deployment configuration
replicaCount: 1

# Resource limits and requests
resources:
  requests:
    memory: "64Mi"
    cpu: "20m"
  limits:
    memory: "256Mi"
    cpu: "100m"

# Pod-level security context
# These settings apply to the entire pod and enforce non-root execution
# UID 65532 matches the distroless:nonroot image's built-in user
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
# These settings apply to individual containers for additional hardening
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Namespace
namespace: kube-system

# ServiceAccount
serviceAccount:
  create: true
  name: ""

# Labels
labels:
  app: k8s-agent-test
  component: metrics-agent

# Environment variables
env: []