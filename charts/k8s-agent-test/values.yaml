# Default values for k8s-agent-test
# This is a YAML-formatted file.

# Image configuration
image:
  repository: pump/k8s-agent-test
  tag: "v1.0.0"
  pullPolicy: Always

# Deployment configuration
replicaCount: 1

# Resource limits and requests
resources:
  requests:
    memory: "64Mi"
    cpu: "20m"
  limits:
    memory: "256Mi"
    cpu: "100m"

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Pod-level security context (applies to the whole pod)
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

# Whether to mount the ServiceAccount token into the pod.
# This agent uses in-cluster auth and typically requires this to be true.
automountServiceAccountToken: true

# Namespace
namespace: kube-system

# ServiceAccount
serviceAccount:
  create: true
  name: ""

# Labels
labels:
  app: k8s-agent-test
  component: metrics-agent

# Environment variables
env: []