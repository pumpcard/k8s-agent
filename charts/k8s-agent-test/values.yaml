# Default values for k8s-agent-test
# This is a YAML-formatted file.

# Image configuration
# Dev ECR default; for prod use: --set image.repository=016493718240.dkr.ecr.us-west-2.amazonaws.com/pump --set image.tag=<version>-k8s-agent
image:
  repository: 258131496527.dkr.ecr.us-west-2.amazonaws.com/pump-dev
  tag: "latest-k8s-agent"
  pullPolicy: Always

# Component configuration
# Cluster-level component collects all metrics (node and pod level granularity)
defaultComponents:
  enabled: true

# Cluster-level component (Deployment - collects cluster-wide metrics with full granularity)
components:
  cluster:
    enabled: true
    replicaCount: 1
  
  # Node-level component (DaemonSet - disabled by default, redundant with cluster component)
  node:
    enabled: false

# Resource limits and requests
resources:
  requests:
    memory: "64Mi"
    cpu: "20m"
  limits:
    memory: "256Mi"
    cpu: "100m"

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Container Security Context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL


# Namespace
namespace: kube-system

# ServiceAccount
serviceAccount:
  create: true
  name: ""

# Labels
labels:
  app: k8s-agent-test
  component: metrics-agent

# Metrics export: send cluster metrics to API (optional)
metricsExport:
  enabled: true
  endpoint: "https://api-dev.pump.co/metrics-ingestion/cluster-metrics"
  clusterId: "pump-prod"   # Override per cluster
  customerId: "1"
  timeoutSeconds: 90

# Auth0: pass via --set auth0.clientId=xxx --set auth0.clientSecret=xxx
# Agent uses these to fetch Bearer token from Auth0
auth0:
  enabled: true

# Optional: install metrics-server (Kubernetes resource metrics for kubectl top, HPA).
# Set to true to install/upgrade metrics-server to a version compatible with K8s 1.29+;
# leave false if your cluster already has metrics-server or you manage it elsewhere.
metricsServer:
  install: false

# Subchart values for metrics-server when metricsServer.install is true (optional overrides)
metrics-server: {}

env: []