# Default values for k8s-agent-test
# This is a YAML-formatted file.

# Image configuration
image:
  repository: andyatpump/k8s-agent-test
  tag: "v1.3.0"
  pullPolicy: Always

# Component configuration
# Cluster-level component collects all metrics (node and pod level granularity)
defaultComponents:
  enabled: true

# Cluster-level component (Deployment - collects cluster-wide metrics with full granularity)
components:
  cluster:
    enabled: true
    replicaCount: 1
  
  # Node-level component (DaemonSet - disabled by default, redundant with cluster component)
  node:
    enabled: false

# Resource limits and requests
resources:
  requests:
    memory: "64Mi"
    cpu: "20m"
  limits:
    memory: "256Mi"
    cpu: "100m"

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Container Security Context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL


# Namespace
namespace: kube-system

# ServiceAccount
serviceAccount:
  create: true
  name: ""

# Labels
labels:
  app: k8s-agent-test
  component: metrics-agent

# Metrics export: send cluster metrics to API (optional)
metricsExport:
  enabled: true
  endpoint: "https://api-dev.pump.co/metrics-ingestion/cluster-metrics"
  clusterId: "pump-prod"   # Override per cluster
  customerId: "1"

env: []