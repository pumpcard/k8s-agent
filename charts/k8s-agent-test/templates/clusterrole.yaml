apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-agent-test.fullname" . }}
  labels:
    {{- include "k8s-agent-test.labels" . | nindent 4 }}
rules:
  # Read nodes for cluster-level metrics
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Read pods for workload metrics
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Read deployments, replicasets, daemonsets, statefulsets for workload metrics
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # Read services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # Read events for cluster health
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
