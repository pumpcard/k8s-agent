{{- if and .Values.defaultComponents.enabled (or (not (hasKey .Values "components")) .Values.components.node.enabled) }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "k8s-agent-test.fullname" . }}-node
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-agent-test.labels" . | nindent 4 }}
    component: node
spec:
  selector:
    matchLabels:
      {{- include "k8s-agent-test.selectorLabels" . | nindent 6 }}
      component: node
  template:
    metadata:
      labels:
        {{- include "k8s-agent-test.selectorLabels" . | nindent 8 }}
        component: node
    spec:
      serviceAccountName: {{ include "k8s-agent-test.serviceAccountName" . }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: host-root
          mountPath: /host
          readOnly: true
        env:
        - name: COLLECTION_MODE
          value: "node"
        {{- if .Values.env }}
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: host-root
        hostPath:
          path: /
          type: Directory
      restartPolicy: Always
      tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
{{- end }}
