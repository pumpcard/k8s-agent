apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-agent-test.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-agent-test.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-agent-test.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-agent-test.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "k8s-agent-test.serviceAccountName" . }}
      automountServiceAccountToken: true
      # Pod-level security context - enforces non-root execution with explicit UID/GID
      # UID 65532 matches the distroless:nonroot image's built-in user
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        # Container-level security context - additional hardening
        {{- with .Values.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if .Values.env }}
        env:
          {{- range .Values.env }}
          - name: {{ .name }}
            value: {{ .value | quote }}
          {{- end }}
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      restartPolicy: Always
