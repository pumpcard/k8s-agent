{{- if and .Values.defaultComponents.enabled (or (not (hasKey .Values "components")) .Values.components.cluster.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-agent-test.fullname" . }}-cluster
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-agent-test.labels" . | nindent 4 }}
    component: cluster
spec:
  replicas: {{ .Values.components.cluster.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "k8s-agent-test.selectorLabels" . | nindent 6 }}
      component: cluster
  template:
    metadata:
      labels:
        {{- include "k8s-agent-test.selectorLabels" . | nindent 8 }}
        component: cluster
    spec:
      serviceAccountName: {{ include "k8s-agent-test.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if .Values.env }}
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      restartPolicy: Always
{{- end }}
