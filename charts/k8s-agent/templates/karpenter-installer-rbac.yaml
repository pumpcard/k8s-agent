{{- if .Values.karpenter.installIfMissing }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-agent.fullname" . }}-karpenter-installer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-agent.fullname" . }}-karpenter-installer
  labels:
    {{- include "k8s-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  # Detect existing Karpenter CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  # Helm needs broad access to install Karpenter (CRDs, RBAC, Deployments, Services, etc.)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-agent.fullname" . }}-karpenter-installer
  labels:
    {{- include "k8s-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-agent.fullname" . }}-karpenter-installer
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-agent.fullname" . }}-karpenter-installer
    namespace: {{ .Release.Namespace }}
{{- end }}
