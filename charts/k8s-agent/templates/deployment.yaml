{{- if and .Values.defaultComponents.enabled (or (not (hasKey .Values "components")) .Values.components.cluster.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-agent.fullname" . }}-cluster
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-agent.labels" . | nindent 4 }}
    component: cluster
spec:
  replicas: {{ .Values.components.cluster.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "k8s-agent.selectorLabels" . | nindent 6 }}
      component: cluster
  template:
    metadata:
      labels:
        {{- include "k8s-agent.selectorLabels" . | nindent 8 }}
        component: cluster
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "k8s-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        env:
        {{- if and (hasKey .Values "metricsExport") .Values.metricsExport.enabled }}
        - name: METRICS_EXPORT_ENDPOINT
          value: {{ .Values.metricsExport.endpoint | quote }}
        - name: CUSTOMER_ID
          value: {{ .Values.metricsExport.customerId | quote }}
        - name: METRICS_EXPORT_TIMEOUT_SECONDS
          value: {{ .Values.metricsExport.timeoutSeconds | default 90 | toString | quote }}
        {{- end }}
        {{- if and (hasKey .Values "auth0") .Values.auth0.enabled .Values.auth0.clientId .Values.auth0.clientSecret }}
        - name: AUTH0_CLIENT_ID
          value: {{ .Values.auth0.clientId | quote }}
        - name: AUTH0_CLIENT_SECRET
          value: {{ .Values.auth0.clientSecret | quote }}
        {{- end }}
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      restartPolicy: Always
{{- end }}
