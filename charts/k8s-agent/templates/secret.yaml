{{- if and (hasKey .Values "auth0") .Values.auth0.enabled (not .Values.auth0.existingSecret) .Values.auth0.clientId .Values.auth0.clientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-agent.fullname" . }}-auth0
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH0_CLIENT_ID: {{ .Values.auth0.clientId | quote }}
  AUTH0_CLIENT_SECRET: {{ .Values.auth0.clientSecret | quote }}
{{- end }}
