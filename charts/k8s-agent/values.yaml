# Default values for k8s-agent
# This is a YAML-formatted file.

# Log level: debug | info | warn | error (default: info). Use debug to get payload identity/preview in logs for troubleshooting.
logLevel: info

# Image configuration
image:
  repository: public.ecr.aws/b6q7g2c1/pump
  tag: "latest-k8s-agent"
  pullPolicy: Always

# Component configuration
# Cluster-level component collects all metrics (node and pod level granularity)
defaultComponents:
  enabled: true

# Cluster-level component (Deployment - collects cluster-wide metrics with full granularity)
components:
  cluster:
    enabled: true
    replicaCount: 1
  
  # Node-level component (DaemonSet - disabled by default, redundant with cluster component)
  node:
    enabled: false

# Resource limits and requests
resources:
  requests:
    memory: "64Mi"
    cpu: "20m"
  limits:
    memory: "256Mi"
    cpu: "100m"

# Pod Annotations (applied to spec.template.metadata.annotations)
podAnnotations: {}

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Container Security Context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL


# Schedule only on Linux nodes (required for mixed Windows/Linux clusters; image is Linux-only)
nodeSelector:
  kubernetes.io/os: linux

# ServiceAccount
serviceAccount:
  create: true
  name: ""

# Labels
labels:
  app: k8s-agent
  component: metrics-agent

# Metrics export: send cluster metrics to API (optional)
metricsExport:
  enabled: true
  endpoint: "https://api.pump.co/metrics-ingestion/cluster-metrics"
  timeoutSeconds: 90

# Auth0: credentials for Bearer token used by the ingestion API.
# Option 1: Pass credentials via --set (Helm creates the Secret automatically):
#   helm install k8s-agent ./charts/k8s-agent \
#     --set auth0.clientId=xxx --set auth0.clientSecret=xxx
# Option 2: Pre-create a Secret and reference it (e.g. via ESO, Vault, etc.):
#   helm install k8s-agent ./charts/k8s-agent \
#     --set auth0.existingSecret=my-auth0-secret
auth0:
  enabled: true
  # existingSecret: ""  # Name of a pre-existing Secret containing AUTH0_CLIENT_ID and AUTH0_CLIENT_SECRET
  # clientId: ""         # Only used when existingSecret is not set
  # clientSecret: ""     # Only used when existingSecret is not set

env: []
